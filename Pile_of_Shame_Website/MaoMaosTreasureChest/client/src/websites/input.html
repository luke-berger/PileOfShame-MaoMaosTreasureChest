<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eingabe</title>
    <!--- Stylesheet reference-->
    <link href="./../css/tailwind.css" rel="stylesheet" />
    <link href="./../css/styles.css" rel="stylesheet" />
    <!--- Icon im Tab -->
    <link rel="icon" type="image/png" href="./../pictures/maomao.png" />
  </head>
  <body>
    <header>
      <!--- Line between Header and Nav -->
      <div class="DividerLineHeader">
        <main class="flex flex-row justify-start">
          <div class="w-16 pl-2 pt-2">
            <img
              src="./../pictures/maomao.png"
              alt="Logo of the Red Panda MaoMao"
            />
          </div>
          <div class="self-center text-3xl pl-5 pt-2">
            <h1>Startseite</h1>
          </div>
        </main>
      </div>
      <!--- Line between Nav and Main -->
      <div class="DividerLineNav">
        <!--- Navigation Buttons -->
        <nav class="navigation">
          <div class="Buttons">
            <div class="Button1">
              <!--- Navigation zur Starseite--><a href="./../../index.html">
                <button class="NavButtons">Startseite</button></a
              >
            </div>

            <div class="Button2">
              <!--- Navigation zur About-Page-->
              <a href="./about.html"
                ><button class="NavButtons">About</button></a
              >
            </div>

            <div class="Button3">
              <!--- Navigation zur Eingabe-Page-->
              <a href="./input.html">
                <button class="NavButtonsVariant">Eingabe</button>
              </a>
            </div>

            <div class="Button4">
              <!--- Navigation zur Übersicht-Page-->
              <a href="./overview.html">
                <button class="NavButtons">Übersicht</button>
              </a>
            </div>

            <div class="Button5">
              <!--- Navigation zur Impressum-Page-->
              <a href="./imprint.html"
                ><button class="NavButtons">Impressum</button></a
              >
            </div>
          </div>
        </nav>
      </div>
    </header>

      <main class="flex flex-col justify-evenly xl:flex-row xl:justify-evenly xl:textxl 2xl:text-2xl">
        <p  class="w-2">
          <form>
            <p class="my-1 font-bold">
              <label for="fname">Titel des Items:</label><br>
            </p>
            <p class="text-red-800">
              <input type="text" id="fname" name="fname" />
            </p>
          </form>
        </p>

        <p class="w-2">
          <form>
            <p class="my-1 font-bold">
              <label for="fname">Beschreibung:</label><br>
            </p>
            <p class="text-red-800">
              <textarea id="fname" name="fname" rows="3" cols="40"></textarea>
            </p>
            <input type="submit" value="Submit"/>
          </form>
        </p>

        <p class="w-2">
          <form>
            <p class="my-1 font-bold">
              <label for="fname">Kaufpreis:</label><br>
            </p>
            <p class="text-red-800">
              <input type="number" id="fname" name="fname" />
            </p>
          </form>
        </p>

        <p class="w-2">
          <form>
            <p class="my-1 font-bold">
              <label for="fname">Kaufdatum:</label><br>
            </p>
            <p class="text-red-800">
              <input type="date" id="fname" name="fname" />
            </p>
          </form>
        </p>

        <p class="w-16">
          <form>
            <p class="my-1 font-bold">
              <label for="fname">Kategorien:</label><br>
            </p>
            <input type="checkbox" id="input1" name="input1" value="Bücher"/>
            <label for="input1">Bücher</label>
            <input type="checkbox" id="input2" name="input2" value="Games"/>
            <label for="input2">Games</label>
            <input type="checkbox" id="input3" name="input3" value="Brettspiele"/>
            <label for="input3">Brettspiele</label><br>
            <input type="checkbox" id="input4" name="input4" value="Filme"/>
            <label for="input4">Filme</label>
            <input type="checkbox" id="input5" name="input5" value="Serien"/>
            <label for="input5">Serien</label>
            <input type="checkbox" id="input6" name="input6" value="Musikalben"/>
            <label for="input6">Musikalben</label>
          </form>
        </p>

        <p class="w-2">
          <form>
            <p class="my-1 font-bold">
              <label for="fname">Bildupload:</label><br>
            </p>
            <input type="file" accept=".png, .jpg, .jpeg" id="fname" name="fname" />
          </form>
        </p>
      </main>
    <br>
    <br>

    <footer>
      <!--- Link zur Impressum-Page-->
      <div class="ImprintLink">
        <a href="./imprint.html"
          ><button class="NavButtons">Impressum</button></a
        >
      </div>
    </footer>
  </body>
</html>
