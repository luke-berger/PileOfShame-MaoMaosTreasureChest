<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Übersicht</title>
    <!--- Stylesheet reference-->
    <link href="./../css/tailwind.css" rel="stylesheet" />
    <link href="./../css/styles.css" rel="stylesheet" />
    <script type="module" src="./../scripts/cards.ts"></script>
    <!--- Icon im Tab -->
    <link rel="icon" type="image/png" href="./../pictures/maomao.png" />
  </head>
  <body>
    <header>
      <!--- Line between Header and Nav -->
      <div class="DividerLineHeader">
        <main class="flex flex-row justify-start">
          <div class="w-16 pl-2 pt-2">
            <img
              src="./../pictures/maomao.png"
              alt="Logo of the Red Panda MaoMao"
            />
          </div>
          <div class="self-center text-3xl pl-5 pt-2">
            <h1>Startseite</h1>
          </div>
        </main>
      </div>
      <!--- Line between Nav and Main -->
      <div class="DividerLineNav">
        <!--- Navigation Buttons -->
        <nav class="navigation">
          <div class="Buttons">
            <div class="Button1">
              <!--- Navigation zur Starseite--><a
              href="./../../index.html" >
              <button class="NavButtons"> Startseite </button></a
              >
            </div>

            <div class="Button2">
              <!--- Navigation zur About-Page-->
              <a
                href="./about.html"
                ><button class="NavButtons"> About </button></a
              >
            </div>

            <div class="Button3">
              <!--- Navigation zur Eingabe-Page-->
              <a href="./input.html" >
                <button class="NavButtons"> Eingabe </button>
              </a>
            </div>

            <div class="Button4">
              <!--- Navigation zur Übersicht-Page-->
              <a href="./overview.html" >
                <button class="NavButtonsVariant"> Übersicht </button>
              </a>
            </div>

            <div class="Button5">
              <!--- Navigation zur Impressum-Page-->
              <a
                href="./imprint.html"
                ><button class="NavButtons"> Impressum </button></a
              >
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="flex flex-col md:flex-row">
      <div>
        <form class="flex flex-col p-3 items-center sm:items-start sm:flex-row sm:justify-between md:flex-col">
          <div class="my-1 font-bold">
            <label for="fname">Filter:</label><br>
          </div>

          <div class="items-center">
            <input type="checkbox" id="input1" name="input" value="Buch"/>
            <label for="input1">Buch</label>
          </div>

          <div class="items-center">
            <input type="checkbox" id="input2" name="input" value="Game"/>
            <label for="input2">Game</label>
          </div>

          <div class="items-center">
            <input type="checkbox" id="input3" name="input" value="Brettspiel"/>
            <label for="input3">Brettspiel</label>
          </div>

          <div class="items-center">
            <input type="checkbox" id="input4" name="input" value="Film"/>
            <label for="input4">Film</label>
          </div>

          <div class="items-center">
            <input type="checkbox" id="input5" name="input" value="Serie"/>
            <label for="input5">Serie</label>
          </div>

          <div class="items-center">
            <input type="checkbox" id="input6" name="input" value="Musikalbum"/>
            <label for="input6">Musikalbum</label>
          </div>

          <br>
          <input type="submit" value="Suchen"/>
        </form>
      </div>

      <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pt-3 pr-3 pb-10"></div>

    <footer>
      <!--- Link zur Impressum-Page-->
      <div class="ImprintLink">
      <a
        href="./imprint.html"
        ><button class="NavButtons"> Impressum </button></a
      >
      </div>
    </footer>
  </body>
</html>
